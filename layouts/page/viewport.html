<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ .Title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/aurora-docs/css/tokens.css">
  <link rel="stylesheet" href="/aurora-docs/css/layouts/viewport-snap.css">
  <link rel="stylesheet" href="/aurora-docs/css/components/button.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <style>
    body { margin: 0; padding: 0; font-family: var(--ds-sys-font-family-base, system-ui); }
    @keyframes pulse-down {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); opacity: 0.8;}
      40% { transform: translateY(-15px); opacity: 1;}
      60% { transform: translateY(-7px); opacity: 0.9;}
    }
    .scroll-indicator {
      position: absolute;
      bottom: 40px;
      animation: pulse-down 2s infinite;
      cursor: pointer;
    }
  </style>
</head>
<body>
  {{ .Content }}
</body>
</html>
