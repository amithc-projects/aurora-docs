<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>{{ .Title }} | Aurora Design System Docs</title>
  {{ partialCached "generate-icon-css.html" . }}
  <script>

    const html = document.documentElement;

    const savedTheme = localStorage.getItem('aurora-theme') || 'corporate';
    const savedMode = localStorage.getItem('aurora-mode') || 'light';

    html.setAttribute('data-theme', savedTheme);
    html.setAttribute('data-mode', savedMode);


  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wdth,wght@75..125,300..700&family=Inter:wght@100..900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href='{{ relURL "css/aurora.css" }}'>
  <link rel="stylesheet" href='{{ relURL "css/docs-theme.css" }}'>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body>

  {{ partial "header.html" . }}

  <div class="docs-layout" style="display: grid; grid-template-columns: 250px 1fr; min-height: 100vh;">
    <aside class="docs-sidebar"
      style="padding: 2rem; border-right: 1px solid var(--ds-sys-color-border); background: var(--ds-sys-color-bg-app);">
      {{ partial "sidebar.html" . }}
    </aside>

    <main class="docs-content" style="padding: 3rem; max-width: 1200px;">
      {{ block "main" . }}{{ end }}
    </main>
  </div>

  {{ partial "command-palette.html" . }}

  <script src='{{ relURL "js/docs.js" }}'></script>
  <script type="module">
    import { initConfigurator } from '{{ relURL "js/configurator.js" }}';
    initConfigurator();
  </script>

  <script type="module">import { initCharts } from '{{ relURL "js/charts.js" }}'; initCharts();</script>
  <script type="module">import { initFilters } from '{{ relURL "js/filters.js" }}'; initFilters();</script>
  <script type="module">
    import { initAccordions } from "/aurora-docs/js/components/accordion.js";
    initAccordions();

    import { initCountdowns } from "/aurora-docs/js/components/countdown.js";
    initCountdowns();

    import { initDrawers } from "/aurora-docs/js/components/drawer.js";
    initDrawers();

    import { initDropdowns } from "/aurora-docs/js/components/dropdown.js";
    initDropdowns();

    import { initTabs } from "/aurora-docs/js/components/tabs.js";
    initTabs();

    import { initCommandPalette } from "/aurora-docs/js/components/command-palette.js";
    initCommandPalette();

    import { initPopovers } from "/aurora-docs/js/components/popover.js";
    initPopovers();

    import { initVirtualKeyboards } from '/aurora-docs/js/components/virtual-keyboard.js';
    initVirtualKeyboards();

    import { initPinInputs } from '/aurora-docs/js/components/pin-input.js';
    initPinInputs();

    import "/aurora-docs/js/components/toast.js";
  </script>
  <script type="module">import { initWizards } from '{{ relURL "js/patterns/wizard.js" }}'; initWizards();</script>
  <script type="module">import { initGallery } from '{{ relURL "js/components/gallery.js" }}'; initGallery();</script>
  <script
    type="module">import { initTableSort } from '{{ relURL "css/components/content/table/table-sort.js" }}'; initTableSort();</script>
</body>

</html>
