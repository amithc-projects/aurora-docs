<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>{{ .Title }} | Aurora Design System Docs</title>
  {{ partialCached "generate-icon-css.html" . }}
  <script>

    const html = document.documentElement;

    const savedTheme = localStorage.getItem('aurora-theme') || 'corporate';
    const savedMode = localStorage.getItem('aurora-mode') || 'light';

    html.setAttribute('data-theme', savedTheme);
    html.setAttribute('data-mode', savedMode);


  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wdth,wght@75..125,300..700&family=Inter:wght@100..900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="{{ " css/aurora.css" | relURL }}">
  <link rel="stylesheet" href="{{ " css/docs-theme.css" | relURL }}">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body>

  {{ partial "header.html" . }}

  <div class="docs-layout" style="display: grid; grid-template-columns: 250px 1fr; min-height: 100vh;">
    <aside class="docs-sidebar"
      style="padding: 2rem; border-right: 1px solid var(--ds-sys-color-border); background: var(--ds-sys-color-bg-app);">
      {{ partial "sidebar.html" . }}
    </aside>

    <main class="docs-content" style="padding: 3rem; max-width: 1200px;">
      {{ block "main" . }}{{ end }}
    </main>
  </div>

  <script src="{{ " js/docs.js" | relURL }}"></script>
  <script type="module">
    import { initConfigurator } from '{{ "js/configurator.js" | relURL }}';
    initConfigurator();
  </script>

  <script type="module">import { initCharts } from '{{ "js/charts.js" | relURL }}'; initCharts();</script>
  <script type="module">import { initFilters } from '{{ "js/filters.js" | relURL }}'; initFilters();</script>
  <script
    type="module">import { initAccordions } from '{{ "js/components/accordion.js" | relURL }}'; initAccordions();</script>
  <script type="module">import { initWizards } from '{{ "js/patterns/wizard.js" | relURL }}'; initWizards();</script>
  <script type="module">import { initGallery } from '{{ "js/components/gallery.js" | relURL }}'; initGallery();</script>
</body>

</html>
