{{ define "main" }}
<div class="docs-page-layout">
    <div class="docs-page-content">
        {{ .Content }}

        {{ if .Pages }}
        <div style="margin-top: 5rem; padding-top: 2rem; border-top: 1px solid var(--ds-sys-color-border);">
            <h3 style="margin-top:0; font-size: 1.5rem; letter-spacing: -0.5px;">Explore this Archetype</h3>
            <p style="color: var(--ds-sys-color-on-surface-variant); margin-bottom: 2rem;">Click below to explore
                sub-pages demonstrating different views or states for this specific application style.</p>

            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem;">
                {{ range .Pages }}
                <a href="{{ .RelPermalink }}"
                    style="display: block; padding: 1.5rem; border: 1px solid var(--ds-sys-color-border); border-radius: 8px; text-decoration: none; color: var(--ds-sys-color-on-surface); background: var(--ds-sys-color-surface); transition: transform 0.2s, box-shadow 0.2s;"
                    onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 12px rgba(0,0,0,0.05)'"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none'">
                    <div style="font-weight: 700; font-size: 1.1rem; margin-bottom: 0.25rem;">{{ .Title }}</div>
                    <div style="font-size: 0.85rem; color: var(--ds-sys-color-on-surface-variant);">View layout details
                        &rarr;</div>
                </a>
                {{ end }}
            </div>
        </div>
        {{ end }}

    </div>
</div>
{{ end }}
