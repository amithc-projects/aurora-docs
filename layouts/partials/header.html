<header style="padding: 1rem 2rem; border-bottom: 1px solid var(--ds-sys-color-border); background: var(--ds-sys-color-surface); display: flex; align-items: center; justify-content: space-between;">
  <div style="display: flex; align-items: center; gap: 1rem;">
    <a href="/" style="font-weight: 800; font-size: 1.25rem; text-decoration: none; color: var(--ds-sys-color-on-surface);">AURORA DOCS</a>
  </div>

  <div style="display: flex; align-items: center; gap: 1rem;">
    
    <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem;">
      <label for="theme-select">Theme:</label>
      <select id="theme-select" style="padding: 4px; border-radius: 4px;">
        <option value="corporate">Corporate</option>
        <option value="casual">Casual</option>
      </select>
    </div>

    <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem;">
      <label for="mode-select">Mode:</label>
      <select id="mode-select" style="padding: 4px; border-radius: 4px;">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </div>

  </div>
</header>
