<header
  style="padding: 1rem 2rem; border-bottom: 1px solid var(--ds-sys-color-border); background: var(--ds-sys-color-surface); display: flex; align-items: center; justify-content: space-between;">
  <div style="display: flex; align-items: center; gap: 1rem;">
    <a href="/"
      style="font-weight: 800; font-size: 1.25rem; text-decoration: none; color: var(--ds-sys-color-on-surface);">AURORA
      DOCS</a>
  </div>

  <div style="display: flex; align-items: center; gap: 1rem; flex: 1; max-width: 400px; margin: 0 2rem;">
    <button onclick="if(window.openCmd) window.openCmd()"
      style="display:flex;align-items:center;justify-content:space-between;width:100%;height:36px;padding:0 0.75rem;background:var(--ds-sys-color-surface-sunken);border:1px solid var(--ds-sys-color-border);border-radius:4px;color:var(--ds-sys-color-text-secondary);cursor:pointer;font-size:0.85rem;">
      <span style="display:flex;align-items:center;gap:0.5rem;"><svg width="14" height="14" viewBox="0 0 20 20"
          fill="none">
          <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="2" />
          <path d="M15 15l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg> Search commands...</span>
      <kbd
        style="font-family:monospace;background:var(--ds-sys-color-surface);border:1px solid var(--ds-sys-color-border);padding:0 4px;border-radius:3px;font-size:0.75rem;">⌘K</kbd>
    </button>
  </div>

  <div style="display: flex; align-items: center; gap: 1rem;">

    <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem;">
      <label for="theme-select">Theme:</label>
      <select id="theme-select" style="padding: 4px; border-radius: 4px;">
        <option value="corporate">Corporate</option>
        <option value="casual">Casual</option>
      </select>
    </div>

    <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem;">
      <label for="mode-select">Mode:</label>
      <select id="mode-select" style="padding: 4px; border-radius: 4px;">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </div>

  </div>
</header>
