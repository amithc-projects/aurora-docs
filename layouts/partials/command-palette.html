<!-- Command palette global modal -->
<div class="cmd-backdrop" id="cmdBackdrop" role="dialog" aria-modal="true" aria-label="Command palette">
    <div class="cmd-panel" id="cmdPanel">
        <div class="cmd-input-row">
            <svg class="cmd-search-icon" width="18" height="18" viewBox="0 0 20 20" fill="none">
                <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.75" />
                <path d="M15 15l3 3" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
            </svg>
            <input class="cmd-input" id="cmdInput" type="search" placeholder="Search commands and pages…"
                autocomplete="off" spellcheck="false" role="combobox" aria-expanded="false" aria-autocomplete="list"
                aria-controls="cmdResults" />
            <button class="cmd-clear" id="cmdClear" aria-label="Clear search">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M2 2l8 8M10 2L2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                </svg>
            </button>
        </div>
        <div class="cmd-results" id="cmdResults" role="listbox" aria-label="Search results"></div>
        <div class="cmd-footer">
            <div class="cmd-footer-hints">
                <span class="cmd-hint"><kbd class="kbd">↑↓</kbd> navigate</span>
                <span class="cmd-hint"><kbd class="kbd">↵</kbd> open</span>
                <span class="cmd-hint"><kbd class="kbd">esc</kbd> close</span>
            </div>
        </div>
    </div>
</div>
